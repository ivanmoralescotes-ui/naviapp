<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <title>Cambiar contraseña de configuración</title>
  <style>
    :root{
      --bg:#f4f7fb;--card:#fff;--text:#172033;--muted:#667085;
      --border:#d8e0ea;--primary:#2563eb;--primary-dark:#1d4ed8;
      --danger:#b42318;--danger-bg:#fef3f2;--success:#067647;
      --success-bg:#ecfdf3;--focus:rgba(37,99,235,.22);
      --shadow:0 14px 38px rgba(23,32,51,.10);--radius:16px
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;min-height:100vh;font-family:Inter,system-ui,-apple-system,
      BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);
      background:radial-gradient(circle at top left,rgba(37,99,235,.11),transparent 30rem),var(--bg)
    }
    button,input{font:inherit}
    button{touch-action:manipulation}
    .page{
      width:min(100%,560px);margin:0 auto;
      padding:max(24px,env(safe-area-inset-top)) 16px max(32px,env(safe-area-inset-bottom))
    }
    header{text-align:center;padding:10px 4px 20px}
    h1{margin:0;font-size:clamp(1.45rem,6vw,2rem);line-height:1.2}
    .subtitle{margin:9px auto 0;max-width:430px;color:var(--muted);font-size:.94rem;line-height:1.5}
    .card{
      padding:20px;border:1px solid rgba(216,224,234,.9);
      border-radius:20px;background:rgba(255,255,255,.97);box-shadow:var(--shadow)
    }
    .field{display:grid;gap:7px}
    .field+.field{margin-top:17px}
    label{font-size:.92rem;font-weight:750}
    .required{color:var(--danger)}
    .input-wrap{position:relative}
    input[type=password],input[type=text]{
      width:100%;min-height:52px;padding:12px 62px 12px 14px;
      border:1px solid var(--border);border-radius:14px;color:var(--text);
      background:var(--card);outline:none;transition:border-color .16s,box-shadow .16s
    }
    input:focus{border-color:var(--primary);box-shadow:0 0 0 4px var(--focus)}
    input[aria-invalid=true]{border-color:var(--danger);box-shadow:0 0 0 4px rgba(180,35,24,.12)}
    .toggle{
      position:absolute;top:50%;right:7px;transform:translateY(-50%);
      min-width:47px;min-height:38px;padding:7px 9px;border:0;border-radius:9px;
      color:var(--primary-dark);background:transparent;font-size:.8rem;font-weight:750;cursor:pointer
    }
    .toggle:hover{background:#eff6ff}
    .toggle:focus-visible,.save:focus-visible{outline:3px solid var(--focus);outline-offset:2px}
    .help,.error{margin:0;font-size:.81rem;line-height:1.4}
    .help{color:var(--muted)}
    .error{min-height:1.15em;color:var(--danger);font-weight:650}
    .save{
      width:100%;min-height:52px;margin-top:22px;padding:12px 16px;border:0;
      border-radius:14px;color:#fff;background:var(--primary);font-weight:800;cursor:pointer
    }
    .save:hover{background:var(--primary-dark)}
    .save:disabled{opacity:.58;cursor:not-allowed}
    .notice{
      display:none;margin-bottom:15px;padding:13px 15px;border:1px solid transparent;
      border-radius:14px;font-size:.9rem;font-weight:720;line-height:1.45
    }
    .notice.show{display:block}
    .notice.success{color:var(--success);border-color:#a6f4c5;background:var(--success-bg)}
    .notice.error{color:var(--danger);border-color:#f7b6b2;background:var(--danger-bg)}
    .footer{margin:16px 8px 0;color:var(--muted);font-size:.78rem;line-height:1.45;text-align:center}
    @media(min-width:560px){.card{padding:24px}}
    @media(prefers-reduced-motion:reduce){*{scroll-behavior:auto!important;transition:none!important}}
  </style>
</head>
<body>
  <main class="page">
    <header>
      <h1>Cambiar contraseña</h1>
      <p class="subtitle">Ingresa tu contraseña actual y escribe dos veces la nueva contraseña.</p>
    </header>

    <div id="notice" class="notice" role="status" aria-live="polite"></div>

    <form id="form" class="card" novalidate>
      <div class="field">
        <label for="currentPassword">Contraseña actual <span class="required">*</span></label>
        <div class="input-wrap">
          <input id="currentPassword" type="password" autocomplete="current-password" maxlength="20" required>
          <button class="toggle" type="button" data-target="currentPassword" aria-label="Mostrar contraseña actual">Ver</button>
        </div>
        <p id="currentPasswordError" class="error"></p>
      </div>

      <div class="field">
        <label for="newPassword">Nueva contraseña <span class="required">*</span></label>
        <div class="input-wrap">
          <input id="newPassword" type="password" autocomplete="new-password" minlength="3" maxlength="20" required>
          <button class="toggle" type="button" data-target="newPassword" aria-label="Mostrar nueva contraseña">Ver</button>
        </div>
        <p class="help">Usa entre 3 y 20 caracteres.</p>
        <p id="newPasswordError" class="error"></p>
      </div>

      <div class="field">
        <label for="confirmPassword">Confirmar nueva contraseña <span class="required">*</span></label>
        <div class="input-wrap">
          <input id="confirmPassword" type="password" autocomplete="new-password" minlength="3" maxlength="20" required>
          <button class="toggle" type="button" data-target="confirmPassword" aria-label="Mostrar confirmación de la nueva contraseña">Ver</button>
        </div>
        <p id="confirmPasswordError" class="error"></p>
      </div>

      <button id="saveButton" class="save" type="submit">Guardar</button>
    </form>

    <p class="footer">Esta versión solo valida los campos en el navegador. Todavía no realiza cambios en el servidor.</p>
  </main>

  <script>
    (() => {
      "use strict";

      const form = document.getElementById("form");
      const notice = document.getElementById("notice");
      const saveButton = document.getElementById("saveButton");

      const fields = {
        currentPassword: {
          input: document.getElementById("currentPassword"),
          error: document.getElementById("currentPasswordError")
        },
        newPassword: {
          input: document.getElementById("newPassword"),
          error: document.getElementById("newPasswordError")
        },
        confirmPassword: {
          input: document.getElementById("confirmPassword"),
          error: document.getElementById("confirmPasswordError")
        }
      };

      document.querySelectorAll("[data-target]").forEach(button => {
        button.addEventListener("click", () => {
          const input = document.getElementById(button.dataset.target);
          const show = input.type === "password";
          input.type = show ? "text" : "password";
          button.textContent = show ? "Ocultar" : "Ver";
        });
      });

      Object.values(fields).forEach(({ input }) => {
        input.addEventListener("input", () => {
          clearError(input.id);
          hideNotice();
        });
      });

      form.addEventListener("submit", event => {
        event.preventDefault();

        if (!validate()) {
          showNotice("Revisa los campos marcados antes de guardar.", "error");
          return;
        }

        saveButton.disabled = true;
        saveButton.textContent = "Guardando...";

        setTimeout(() => {
          showNotice(
            "Validación exitosa. El cambio de contraseña está listo para conectarse al backend.",
            "success"
          );
          saveButton.disabled = false;
          saveButton.textContent = "Guardar";
        }, 600);
      });

      function validate() {
        Object.keys(fields).forEach(clearError);

        const current = fields.currentPassword.input.value;
        const next = fields.newPassword.input.value;
        const confirm = fields.confirmPassword.input.value;
        let firstInvalid = null;

        if (!current.trim()) {
          setError("currentPassword", "La contraseña actual es obligatoria.");
          firstInvalid ||= fields.currentPassword.input;
        }

        if (!next) {
          setError("newPassword", "La nueva contraseña es obligatoria.");
          firstInvalid ||= fields.newPassword.input;
        } else if (next.length < 3) {
          setError("newPassword", "La nueva contraseña debe tener al menos 3 caracteres.");
          firstInvalid ||= fields.newPassword.input;
        }

        if (!confirm) {
          setError("confirmPassword", "Debes repetir la nueva contraseña.");
          firstInvalid ||= fields.confirmPassword.input;
        } else if (next !== confirm) {
          setError("confirmPassword", "Las nuevas contraseñas no coinciden.");
          firstInvalid ||= fields.confirmPassword.input;
        }

        if (current && next && current === next) {
          setError("newPassword", "La nueva contraseña debe ser diferente de la actual.");
          firstInvalid ||= fields.newPassword.input;
        }

        if (firstInvalid) {
          firstInvalid.scrollIntoView({ behavior: "smooth", block: "center" });
          setTimeout(() => firstInvalid.focus({ preventScroll: true }), 200);
          return false;
        }

        return true;
      }

      function setError(name, message) {
        fields[name].input.setAttribute("aria-invalid", "true");
        fields[name].error.textContent = message;
      }

      function clearError(name) {
        if (!fields[name]) return;
        fields[name].input.removeAttribute("aria-invalid");
        fields[name].error.textContent = "";
      }

      function showNotice(message, type) {
        notice.className = `notice show ${type}`;
        notice.textContent = message;
      }

      function hideNotice() {
        notice.className = "notice";
        notice.textContent = "";
      }
    })();
  </script>
</body>
</html>
